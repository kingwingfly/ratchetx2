[package]
name = "ratchetx2"
version = "0.1.0-alpha.2"
edition = "2024"
keywords = ["double-ratchet"]
license = "MIT"
authors = ["Louis <836250617@qq.com>"]
repository = "https://github.com/kingwingfly/ratchetx2"
documentation = "https://docs.rs/ratchetx2"
description = "A double-ratchet implementation for building an E2EE message exchange app."

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
bincode = "2.0.1"
futures = "0.3.31"
ring = { version = "0.17.14", features = ["std"] }
thiserror = "2.0.12"
tracing = "0.1.41"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros", "rt-multi-thread"] }
